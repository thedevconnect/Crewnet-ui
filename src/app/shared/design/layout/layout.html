<div class="layout-wrapper">
  <!-- Sidebar Component -->
  <app-sidebar [sidebarOpen]="sidebarOpen()" />

  <!-- Main Content Area -->
  <div class="main-content-area" [class.sidebar-closed]="!sidebarOpen()">

    <!-- Header Component - Fixed -->
    @if (userDetails(); as user) {
    <header class="header-fixed">
      <app-header [user]="user" [sidebarOpen]="sidebarOpen()" [selectedRoleId]="selectedRoleId()" (onLogout)="logout()"
        (onRoleChange)="onRoleChange($event)" (onToggleSidebar)="toggleSidebar()" />
    </header>
    }

    <!-- Main Content -->
    <main class="content-main">
      <router-outlet />
    </main>

    <!-- Footer -->
    <footer class="content-footer">
      <div class="footer-content">
        <span>© 2025 sam tyagi Pvt. Ltd.</span>
        <span class="footer-links">
          Privacy · Terms
        </span>
      </div>
    </footer>
  </div>

  <!-- Global Toast and Confirm Dialog -->
  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>
</div>
