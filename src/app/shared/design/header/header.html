<!-- Header Content - Matching Screenshot Design -->
<div class="flex items-center justify-between w-full px-6 py-3 bg-white border-b border-gray-200 h-[73px]">
  <div class="flex items-center justify-between w-full">
    <!-- Left Section -->
    <div class="flex items-center gap-4">
      <!-- Logo Section - White text with multicolor letters -->
      <div class="flex items-center justify-center">
        <span class="text-2xl font-bold font-sans flex items-center gap-0">
          <span class="text-2xl font-bold transition-transform duration-200 hover:scale-110" style="color: #FF9800;">o</span>
          <span class="text-2xl font-bold transition-transform duration-200 hover:scale-110" style="color: #9C27B0;">b</span>
          <span class="text-2xl font-bold transition-transform duration-200 hover:scale-110" style="color: #2196F3;">l</span>
          <span class="text-2xl font-bold transition-transform duration-200 hover:scale-110" style="color: #4CAF50;">o</span>
        </span>
      </div>
      <button 
        type="button" 
        (click)="toggleSidebar()" 
        class="p-2 rounded-lg border-none bg-transparent cursor-pointer transition-colors duration-200 flex items-center justify-center hover:bg-gray-100"
        [pTooltip]="sidebarOpen() ? 'Collapse Sidebar' : 'Expand Sidebar'" 
        tooltipPosition="bottom">
        <i [class]="sidebarOpen() ? 'pi pi-angle-double-left' : 'pi pi-angle-double-right'" class="text-gray-600 text-lg"></i>
      </button>
    </div>

    <!-- Right Section -->
    <div class="flex justify-end items-center gap-4 mr-5 h-[50px]">
      <!-- Location Dropdown (Abohar) -->
      <div class="flex items-center">
        <p-select 
          [options]="locationList" 
          optionLabel="label" 
          optionValue="value" 
          [(ngModel)]="selectedLocation"
          [placeholder]="'Abohar'" 
          [filter]="false" 
          appendTo="body" 
          styleClass="!min-w-[120px] [&_.p-select-label]:!text-sm [&_.p-select-label]:!font-medium [&_.p-select-label]:!px-3 [&_.p-select-label]:!py-1.5">
        </p-select>
      </div>

      <!-- Role Dropdown (ESS) -->
      <div class="flex items-center">
        <p-select 
          [options]="roleList" 
          optionLabel="rolDes" 
          optionValue="roleId" 
          [(ngModel)]="internalSelectedRoleId"
          [placeholder]="currentRole() || 'Select Role'" 
          [filter]="false" 
          appendTo="body" 
          styleClass="!min-w-[120px] [&_.p-select-label]:!text-sm [&_.p-select-label]:!font-medium [&_.p-select-label]:!px-3 [&_.p-select-label]:!py-1.5"
          (onChange)="onRoleDropdownChange($event)">
        </p-select>
      </div>

      <!-- User Info -->
      <div class="flex items-center gap-2">
        <p-avatar 
          size="normal" 
          shape="circle" 
          class="cursor-pointer !bg-[#1976D2] !w-9 !h-9 transition-transform duration-200 hover:scale-105" 
          (click)="userMenu.toggle($event)">
          <span class="text-white font-semibold text-sm">{{ getUserInitial() }}</span>
        </p-avatar>
        <span class="text-gray-700 font-medium text-sm whitespace-nowrap">{{ getUserName() }}</span>
        <p-menu #userMenu [model]="userMenuItems" [popup]="true" [appendTo]="'body'"></p-menu>
      </div>
    </div>
  </div>
</div>
