<header class="sticky top-0 z-40 flex h-16 items-center justify-between bg-white px-4 shadow-md md:px-6">
  <!-- Mobile Left Area - Logo और sidebar toggle button -->
  <div class="flex items-center space-x-2 md:hidden">
    <a href="/home">
      <img src="assets/logo-icon.png" class="h-8" alt="Logo" />
    </a>
    <button (click)="toggleSidebar.emit()" class="rounded p-2 text-gray-500 hover:bg-gray-200">
      <i [ngClass]="getIcon()"></i>
    </button>
  </div>

  <!-- Desktop Sidebar Toggle Button -->
  <div class="hidden md:flex space-x-4">
    <button (click)="toggleSidebar.emit()" class="rounded p-2 cursor-pointer text-gray-500 hover:bg-gray-200">
      <i [ngClass]="getIcon()"></i>
    </button>
  </div>

  <!-- Right Section - Role dropdown और user menu -->
  <div class="flex items-center space-x-4">
    <!-- Role Dropdown - PrimeNG Select component -->
    <div class="relative min-w-[180px]">
      <p-select 
        [options]="roleList" 
        optionLabel="rolDes" 
        optionValue="roleId" 
        [(ngModel)]="selectedRoleId"
        [placeholder]="currentRole || 'Select Role'" 
        appendTo="body"
        (onChange)="onRoleDropdownChange($event)"
        [filter]="true" 
        filterBy="rolDes" 
        styleClass="w-full h-8 header-dropdown">
      </p-select>
    </div>

    <!-- User Avatar + Menu -->
    <div class="relative">
      <div class="flex items-center gap-2">
        <!-- Avatar with tooltip -->
        <p-avatar
          #userMenuTrigger
          class="shadow cursor-pointer flex items-center justify-center transition-all duration-200 hover:scale-110 hover:shadow-lg"
          size="xlarge"
          shape="circle"
          (click)="userMenu.toggle($event)"
          [pTooltip]="getUserName()"
          tooltipPosition="bottom"
          [style]="{
            'background-color': '#ece9fc',
            color: '#2a1261',
            width: '30px',
            height: '30px',
            border: '2px solid #d1d5db'
          }">
          <p class="text-sm font-semibold">{{ getUserInitial() }}</p>
        </p-avatar>

        <!-- User Name - Desktop only -->
        <div class="hidden md:block">
          <p class="text-xs font-semibold text-gray-700">{{ getUserName() }}</p>
        </div>
      </div>

      <!-- User Menu Popup - PrimeNG Menu component -->
      <p-menu #userMenu [model]="userMenuItems" [popup]="true" [appendTo]="'body'" styleClass="user-profile-menu">
      </p-menu>
    </div>
  </div>
</header>
